# ── Perfil de Desenvolvimento ──
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/viana_db
    username: viana
    password: viana123
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true

# ── JWT ──
app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-viana-advocacia-2026-min-256-bits-xxxxxxxxxxxxx}
    access-token-expiration-ms: 28800000   # 8 horas
    refresh-token-expiration-ms: 604800000  # 7 dias

# ── Cloudflare R2 (credenciais para produção — manter como placeholder em DEV) ──
app.storage:
  endpoint: ${R2_ENDPOINT:https://placeholder.r2.cloudflarestorage.com}
  access-key: ${R2_ACCESS_KEY:placeholder}
  secret-key: ${R2_SECRET_KEY:placeholder}
  bucket: ${R2_BUCKET:viana-dev}
  region: auto
  # Modo local: salva arquivos em disco (true em DEV, false em PROD)
  local: true
  local-path: uploads
