spring:
  application:
    name: viana-advocacia

  # ── JPA / Hibernate ──
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: America/Sao_Paulo

  # ── Flyway ──
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Servlet (upload) ──
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  # ── Jackson ──
  jackson:
    time-zone: America/Sao_Paulo
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# ── Server ──
server:
  port: 8081
  # Em produção não expor detalhes de erro (stacktrace, mensagem interna)
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

# ── Logging padrão (sobrescrito por application-dev.yml / application-prod.yml) ──
logging:
  level:
    com.viana: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
