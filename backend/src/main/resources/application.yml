spring:
  application:
    name: viana-advocacia
  config:
    import: optional:file:.env[.properties]

  # â”€â”€ JPA / Hibernate â”€â”€
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: America/Sao_Paulo

  # â”€â”€ Flyway â”€â”€
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # â”€â”€ Servlet (upload) â”€â”€
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  # â”€â”€ Jackson â”€â”€
  jackson:
    time-zone: America/Sao_Paulo
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# â”€â”€ Server â”€â”€
server:
  port: 8081
  # Em produÃ§Ã£o nÃ£o expor detalhes de erro (stacktrace, mensagem interna)
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

# â”€â”€ Logging padrÃ£o (sobrescrito por application-dev.yml / application-prod.yml) â”€â”€
logging:
  level:
    com.viana: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

api:
  datajud:
    base-url: https://api-publica.datajud.cnj.jus.br
    api-key: ${DATAJUD_API_KEY}
