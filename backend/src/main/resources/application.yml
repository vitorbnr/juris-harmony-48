spring:
  application:
    name: viana-advocacia
  config:
    import: optional:file:.env[.properties]

  # â”€â”€ JPA / Hibernate â”€â”€
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: America/Sao_Paulo

  # â”€â”€ Flyway â”€â”€
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # â”€â”€ Servlet (upload) â”€â”€
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  # â”€â”€ Jackson â”€â”€
  jackson:
    time-zone: America/Sao_Paulo
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# â”€â”€ Server â”€â”€
server:
  port: 8081
  # Em produÃ§Ã£o nÃ£o expor detalhes de erro (stacktrace, mensagem interna)
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

# â”€â”€ Logging padrÃ£o (sobrescrito por application-dev.yml / application-prod.yml) â”€â”€
logging:
  level:
    com.viana: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

api:
  datajud:
    base-url: https://api-publica.datajud.cnj.jus.br
    api-key: ${DATAJUD_API_KEY}
  djen:
    base-url: ${DJEN_API_BASE_URL:https://comunicaapi.pje.jus.br/api/v1}
    user-agent: ${DJEN_USER_AGENT:JurisHarmonyPublicacoes/1.0}
    timeout-seconds: ${DJEN_TIMEOUT_SECONDS:60}
    retry-attempts: ${DJEN_RETRY_ATTEMPTS:3}
    retry-backoff-ms: ${DJEN_RETRY_BACKOFF_MS:1500}
    comunicacao-page-size: ${DJEN_COMUNICACAO_PAGE_SIZE:100}
    comunicacao-max-pages: ${DJEN_COMUNICACAO_MAX_PAGES:100}
  domicilio:
    enabled: ${DOMICILIO_ENABLED:false}
    base-url: ${DOMICILIO_BASE_URL:}
    token-url: ${DOMICILIO_TOKEN_URL:}
    client-id: ${DOMICILIO_CLIENT_ID:}
    client-secret: ${DOMICILIO_CLIENT_SECRET:}
    on-behalf-of: ${DOMICILIO_ON_BEHALF_OF:}
    tenant-id: ${DOMICILIO_TENANT_ID:}
    eu-path: ${DOMICILIO_EU_PATH:/api/v1/eu}
    comunicacoes-path: ${DOMICILIO_COMUNICACOES_PATH:/comunicacoes}
    lookback-days: ${DOMICILIO_LOOKBACK_DAYS:1}
    page-size: ${DOMICILIO_PAGE_SIZE:100}

app:
  sync:
    datajud:
      cron: ${DATAJUD_SYNC_CRON:0 0 */4 * * *}
      stale-hours: ${DATAJUD_SYNC_STALE_HOURS:4}
    domicilio:
      cron: ${DOMICILIO_SYNC_CRON:0 0 */2 * * *}
    djen:
      enabled: ${DJEN_SYNC_ENABLED:false}
      cron: ${DJEN_SYNC_CRON:0 30 6 * * *}
      lookback-days: ${DJEN_SYNC_LOOKBACK_DAYS:3}
      tribunais: ${DJEN_TRIBUNAIS:}
      caderno-tipo: ${DJEN_CADERNO_TIPO:D}
      comunicacao:
        enabled: ${DJEN_COMUNICACAO_ENABLED:true}
      caderno-fallback:
        enabled: ${DJEN_CADERNO_FALLBACK_ENABLED:true}
        on-empty: ${DJEN_CADERNO_FALLBACK_ON_EMPTY:false}
      lock-ttl-minutes: ${DJEN_SYNC_LOCK_TTL_MINUTES:60}
      backfill-max-days: ${DJEN_BACKFILL_MAX_DAYS:31}
      sla-hours: ${DJEN_SYNC_SLA_HOURS:36}
      history-days: ${DJEN_SYNC_HISTORY_DAYS:14}
  alertas:
    prazos:
      cron: ${PRAZO_ALERTA_CRON:0 0 8,13 * * *}
      lookahead-days: ${PRAZO_ALERTA_LOOKAHEAD_DAYS:3}
    integracoes:
      cron: ${INTEGRACAO_ALERTA_CRON:0 0 * * * *}
      thresholds: ${INTEGRACAO_ALERTA_THRESHOLDS:3,5,10}
    publicacoes:
      djen-sla:
        enabled: ${DJEN_SLA_ALERT_ENABLED:true}
        cron: ${DJEN_SLA_ALERT_CRON:0 15 8 * * *}
        max-itens: ${DJEN_SLA_ALERT_MAX_ITENS:8}
        alertar-nunca-executado: ${DJEN_SLA_ALERTAR_NUNCA_EXECUTADO:false}
