spring:
  application:
    name: viana-advocacia
  config:
    import: optional:file:.env[.properties]

  # â”€â”€ JPA / Hibernate â”€â”€
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: America/Sao_Paulo

  # â”€â”€ Flyway â”€â”€
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # â”€â”€ Servlet (upload) â”€â”€
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  # â”€â”€ Jackson â”€â”€
  jackson:
    time-zone: America/Sao_Paulo
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# â”€â”€ Server â”€â”€
server:
  port: 8081
  # Em produÃ§Ã£o nÃ£o expor detalhes de erro (stacktrace, mensagem interna)
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

# â”€â”€ Logging padrÃ£o (sobrescrito por application-dev.yml / application-prod.yml) â”€â”€
logging:
  level:
    com.viana: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

api:
  datajud:
    base-url: https://api-publica.datajud.cnj.jus.br
    api-key: ${DATAJUD_API_KEY}
  domicilio:
    enabled: ${DOMICILIO_ENABLED:false}
    base-url: ${DOMICILIO_BASE_URL:}
    token-url: ${DOMICILIO_TOKEN_URL:}
    client-id: ${DOMICILIO_CLIENT_ID:}
    client-secret: ${DOMICILIO_CLIENT_SECRET:}
    on-behalf-of: ${DOMICILIO_ON_BEHALF_OF:}
    tenant-id: ${DOMICILIO_TENANT_ID:}
    eu-path: ${DOMICILIO_EU_PATH:/api/v1/eu}
    comunicacoes-path: ${DOMICILIO_COMUNICACOES_PATH:/comunicacoes}

app:
  sync:
    datajud:
      cron: ${DATAJUD_SYNC_CRON:0 0 */4 * * *}
      stale-hours: ${DATAJUD_SYNC_STALE_HOURS:4}
    domicilio:
      cron: ${DOMICILIO_SYNC_CRON:0 0 */2 * * *}
  alertas:
    prazos:
      cron: ${PRAZO_ALERTA_CRON:0 0 8,13 * * *}
      lookahead-days: ${PRAZO_ALERTA_LOOKAHEAD_DAYS:3}
