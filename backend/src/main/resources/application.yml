spring:
  application:
    name: viana-advocacia
  config:
    import: optional:file:.env[.properties]

  # ГўвЂќв‚¬ГўвЂќв‚¬ JPA / Hibernate ГўвЂќв‚¬ГўвЂќв‚¬
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: America/Sao_Paulo

  # ГўвЂќв‚¬ГўвЂќв‚¬ Flyway ГўвЂќв‚¬ГўвЂќв‚¬
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ГўвЂќв‚¬ГўвЂќв‚¬ Servlet (upload) ГўвЂќв‚¬ГўвЂќв‚¬
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  # ГўвЂќв‚¬ГўвЂќв‚¬ Jackson ГўвЂќв‚¬ГўвЂќв‚¬
  jackson:
    time-zone: America/Sao_Paulo
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# ГўвЂќв‚¬ГўвЂќв‚¬ Server ГўвЂќв‚¬ГўвЂќв‚¬
server:
  port: 8081
  # Em produГѓВ§ГѓВЈo nГѓВЈo expor detalhes de erro (stacktrace, mensagem interna)
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

# ГўвЂќв‚¬ГўвЂќв‚¬ Logging padrГѓВЈo (sobrescrito por application-dev.yml / application-prod.yml) ГўвЂќв‚¬ГўвЂќв‚¬
logging:
  level:
    com.viana: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

api:
  datajud:
    base-url: https://api-publica.datajud.cnj.jus.br
    api-key: ${DATAJUD_API_KEY}
  djen:
    base-url: ${DJEN_API_BASE_URL:https://comunicaapi.pje.jus.br/api/v1}
    user-agent: ${DJEN_USER_AGENT:JurisHarmonyPublicacoes/1.0}
  inlabs:
    base-url: ${INLABS_BASE_URL:https://inlabs.in.gov.br}
    email: ${INLABS_EMAIL:}
    password: ${INLABS_PASSWORD:}
    login-path: ${INLABS_LOGIN_PATH:/logar.php}
    download-path: ${INLABS_DOWNLOAD_PATH:/index.php}
    user-agent: ${INLABS_USER_AGENT:JurisHarmonyPublicacoes/1.0}
  domicilio:
    enabled: ${DOMICILIO_ENABLED:false}
    base-url: ${DOMICILIO_BASE_URL:}
    token-url: ${DOMICILIO_TOKEN_URL:}
    client-id: ${DOMICILIO_CLIENT_ID:}
    client-secret: ${DOMICILIO_CLIENT_SECRET:}
    on-behalf-of: ${DOMICILIO_ON_BEHALF_OF:}
    tenant-id: ${DOMICILIO_TENANT_ID:}
    eu-path: ${DOMICILIO_EU_PATH:/api/v1/eu}
    comunicacoes-path: ${DOMICILIO_COMUNICACOES_PATH:/comunicacoes}
    lookback-days: ${DOMICILIO_LOOKBACK_DAYS:1}
    page-size: ${DOMICILIO_PAGE_SIZE:100}

app:
  sync:
    datajud:
      cron: ${DATAJUD_SYNC_CRON:0 0 */4 * * *}
      stale-hours: ${DATAJUD_SYNC_STALE_HOURS:4}
    domicilio:
      cron: ${DOMICILIO_SYNC_CRON:0 0 */2 * * *}
    djen:
      enabled: ${DJEN_SYNC_ENABLED:false}
      cron: ${DJEN_SYNC_CRON:0 30 6 * * *}
      lookback-days: ${DJEN_SYNC_LOOKBACK_DAYS:3}
      tribunais: ${DJEN_TRIBUNAIS:}
      caderno-tipo: ${DJEN_CADERNO_TIPO:D}
    dou:
      enabled: ${DOU_SYNC_ENABLED:false}
      cron: ${DOU_SYNC_CRON:0 45 6 * * *}
      lookback-days: ${DOU_SYNC_LOOKBACK_DAYS:3}
      secoes: ${DOU_SECOES:DO1,DO2,DO3}
  alertas:
    prazos:
      cron: ${PRAZO_ALERTA_CRON:0 0 8,13 * * *}
      lookahead-days: ${PRAZO_ALERTA_LOOKAHEAD_DAYS:3}
    integracoes:
      cron: ${INTEGRACAO_ALERTA_CRON:0 0 * * * *}
      thresholds: ${INTEGRACAO_ALERTA_THRESHOLDS:3,5,10}
