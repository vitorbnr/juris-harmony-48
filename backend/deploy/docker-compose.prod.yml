version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: viana_postgres_prod
    environment:
      POSTGRES_DB: ${DB_NAME:-viana_db}
      POSTGRES_USER: ${DB_USERNAME:-viana}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-viana123}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - viana_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U viana"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ../backend
      dockerfile: Dockerfile
    container_name: viana_backend_prod
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-viana_db}
      - DB_USERNAME=${DB_USERNAME:-viana}
      - DB_PASSWORD=${DB_PASSWORD:-viana123}
      - JWT_SECRET=${JWT_SECRET}
      - R2_ENDPOINT=${R2_ENDPOINT}
      - R2_ACCESS_KEY=${R2_ACCESS_KEY}
      - R2_SECRET_KEY=${R2_SECRET_KEY}
      - R2_BUCKET=${R2_BUCKET}
    ports:
      - "8081:8081"
    networks:
      - viana_network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

networks:
  viana_network:
    driver: bridge

volumes:
  pgdata:
